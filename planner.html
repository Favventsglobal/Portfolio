<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">StudentPortal</div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Me</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="planner.html" class="active">Planner</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <h2 class="page-title">Academic Planner</h2>
        <div class="planner-box">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Add a new academic assignment...">
                <button id="addTaskBtn">Add Task</button>
            </div>
            <ul class="task-list" id="taskList">
                <!-- Tasks will generate here dynamically -->
            </ul>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Christian Jimmy Portfolio. COS 106 Term Project.</p>
    </footer>

    <script>
        document.getElementById('addTaskBtn').addEventListener('click', addTask);
        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });

        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();
            
            if (taskText === "") return;

            const li = document.createElement('li');
            li.className = 'task-item';
            
            const textSpan = document.createElement('span');
            textSpan.textContent = taskText;
            li.appendChild(textSpan);

            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'task-actions';

            // Complete Button
            const compBtn = document.createElement('button');
            compBtn.textContent = '✓';
            compBtn.className = 'btn-complete';
            compBtn.onclick = function() {
                li.classList.toggle('completed');
            };

            // Delete Button
            const delBtn = document.createElement('button');
            delBtn.textContent = '✗';
            delBtn.className = 'btn-delete';
            delBtn.onclick = function() {
                li.remove();
            };

            actionsDiv.appendChild(compBtn);
            actionsDiv.appendChild(delBtn);
            li.appendChild(actionsDiv);
            
            document.getElementById('taskList').appendChild(li);
            input.value = "";
        }
    </script>
</body>
</html>
